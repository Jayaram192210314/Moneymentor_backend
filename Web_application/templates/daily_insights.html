    <style>
        :root {
            --bg-main: #fcf4f7;
            --bg-surface: #ffffff;
            --primary: #8b5cf6;
            --primary-rgb: 139, 92, 246;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --info: #3b82f6;
            --primary-gradient: linear-gradient(135deg, #FF5252, #FFC107);
            --tip-gradient: linear-gradient(135deg, #FF4081, #FF9100);
        }

        body {
            background: var(--bg-main);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
        }

        .dashboard-container {
            display: flex;
            min-height: 100vh;
        }

        .main-content {
            flex: 1;
            padding: 0;
            overflow-y: auto;
        }

        @media (max-width: 768px) {
            .main-content {
                padding-top: 60px;
            }
        }

        @media (max-width: 768px) {
            .main-content {
                padding-top: 60px;
            }
        }

        .logo-box-lg {
            width: 40px;
            height: 40px;
            background: var(--primary);
            color: white;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
        }

        /* Header Styling */
        .insights-header-bg {
            background: var(--primary-gradient);
            color: white;
            padding: 30px 40px;
            border-radius: 0 0 30px 30px;
            margin: 0;
            position: relative;
        }

        .back-btn {
            color: white;
            text-decoration: none;
            font-size: 1.5rem;
            transition: transform 0.2s;
            display: inline-block;
            margin-right: 1rem;
        }

        .back-btn:hover {
            transform: translateX(-5px);
            color: rgba(255, 255, 255, 0.8);
        }

        /* Tip Card Styling */
        .tip-card {
            background: var(--tip-gradient);
            border-radius: 2rem;
            padding: 2rem;
            color: white;
            position: relative;
            overflow: hidden;
            border: none;
            box-shadow: 0 15px 30px rgba(255, 64, 129, 0.2);
            margin-bottom: 2rem;
            min-height: 200px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            margin-top: 20px;
        }

        .tip-card .badge-pill {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(5px);
            padding: 0.5rem 1rem;
            border-radius: 2rem;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            width: fit-content;
            margin-bottom: 1.5rem;
        }

        .tip-card h2 {
            font-weight: 700;
            font-size: 1.5rem;
            margin-bottom: 1rem;
            position: relative;
            z-index: 2;
        }

        .tip-card p {
            font-size: 1.1rem;
            line-height: 1.6;
            opacity: 0.95;
            margin-bottom: 0;
            position: relative;
            z-index: 2;
        }

        .tip-card .bg-icon {
            position: absolute;
            right: -20px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 10rem;
            opacity: 0.1;
            color: white;
            z-index: 1;
        }

        .bg-icon {
            position: absolute;
            font-size: 8rem;
            opacity: 0.1;
            right: 20px;
            bottom: -20px;
            transform: rotate(-15deg);
        }


        /* Term Card Styling */
        .term-card {
            background: white;
            border-radius: 2rem;
            padding: 2rem;
            border: 2px solid #FFF8E1;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            margin-bottom: 2rem;
            transition: transform 0.3s ease;
        }

        .term-card .label {
            color: #FFB300;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 1rem;
        }

        .term-card h2 {
            font-weight: 700;
            font-size: 1.5rem;
            color: var(--text-dark);
            margin-bottom: 1rem;
        }

        .term-card p {
            font-size: 1.1rem;
            color: var(--text-muted);
            line-height: 1.6;
            margin-bottom: 0;
        }

        /* Loading Animation */
        .loading-shimmer {
            background: rgba(255, 255, 255, 0.1);
            background-image: linear-gradient(90deg, rgba(255, 255, 255, 0.1) 0px, rgba(255, 255, 255, 0.2) 40px, rgba(255, 255, 255, 0.1) 80px);
            background-size: 600px;
            animation: shimmer 2s infinite linear;
            height: 1.5rem;
            border-radius: 4px;
        }

        @keyframes shimmer {
            0% {
                background-position: -468px 0;
            }

            100% {
                background-position: 468px 0;
            }
        }

        .dark-shimmer {
            background: #f0f0f0;
            background-image: linear-gradient(90deg, #f0f0f0 0px, #e0e0e0 40px, #f0f0f0 80px);
        }
    </style>
</head>

    <!-- JavaScript for Dynamic Data -->
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            fetchDailyTip();
            fetchDailyTerm();
        });

        async function fetchDailyTip() {
            try {
                const response = await fetch('/daily-tip');
                const data = await response.json();

                if (data.status === 'success') {
                    document.getElementById('tipContent').innerHTML = `<p>${data.daily_tip}</p>`;
                } else {
                    document.getElementById('tipContent').innerHTML = '<p>Could not load tip at this moment.</p>';
                }
            } catch (error) {
                console.error('Error fetching daily tip:', error);
                document.getElementById('tipContent').innerHTML = '<p>Error loading tip.</p>';
            }
        }

        async function fetchDailyTerm() {
            try {
                const response = await fetch('/daily-term');
                const data = await response.json();

                if (data.status === 'success') {
                    const termText = data.daily_term;
                    const parts = termText.split(' - ');

                    if (parts.length > 1) {
                        document.getElementById('termTitle').innerText = parts[0];
                        document.getElementById('termContent').innerHTML = `<p>${parts.slice(1).join(' - ')}</p>`;
                    } else {
                        document.getElementById('termTitle').innerText = "Daily Term";
                        document.getElementById('termContent').innerHTML = `<p>${termText}</p>`;
                    }
                } else {
                    document.getElementById('termContent').innerHTML = '<p>Could not load term at this moment.</p>';
                }
            } catch (error) {
                console.error('Error fetching daily term:', error);
                document.getElementById('termContent').innerHTML = '<p>Error loading term.</p>';
            }
        }
    </script>

    <script>
        // Sidebar Toggle Logic
        const sidebar = document.querySelector('.sidebar');
        const sidebarToggle = document.getElementById('sidebarToggle');
        const sidebarOverlay = document.getElementById('sidebarOverlay');

        if (sidebarToggle) {
            sidebarToggle.addEventListener('click', () => {
                sidebar.classList.toggle('active');
                sidebarOverlay.classList.toggle('active');
            });
        }

        if (sidebarOverlay) {
            sidebarOverlay.addEventListener('click', () => {
                sidebar.classList.remove('active');
                sidebarOverlay.classList.remove('active');
            });
        }
    </script>
